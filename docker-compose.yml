services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: daily-news:latest
    container_name: daily-news
    ports:
      # Bind to all interfaces. Docker Desktop on Windows/Mac handles
      # IPv4 + IPv6 loopback through its internal proxy automatically;
      # explicit "[::]:8765:8765" is unreliable on Windows.
      - "8765:8765"
    volumes:
      # SQLite database + selectors.json cache; survives container removal.
      - ./data:/app/data
      # 源码 bind-mount:`docker compose down && up -d --no-build` 即可应用新代码,
      # 不用重 build 镜像。改了 pyproject.toml / uv.lock(新加 Python 依赖)或
      # frontend 时仍需 `up -d --build` 重新装依赖 / 重 build 前端。
      - ./backend/src:/app/backend/src
      - ./backend/alembic:/app/backend/alembic
      - ./backend/main.py:/app/backend/main.py
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
