services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: daily-news:latest
    container_name: daily-news
    ports:
      # IPv4 + IPv6 dual-stack. If your Docker host has IPv6 disabled, the
      # second mapping is silently ignored and the IPv4 one still works.
      - "0.0.0.0:8765:8765"
      - "[::]:8765:8765"
    volumes:
      # SQLite database + selectors.json cache; survives container removal.
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
